name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6.9.x
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.9.0
          modules: qtcharts
          cache: true

      - name: Configure (Linux + QML)
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DMASAREEF_BUILD_QML=ON \
            -B build-ci \
            -S .

      - name: Build
        run: cmake --build build-ci

      - name: Test
        run: ctest --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen
        working-directory: build-ci

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Qt (host tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.9.0
          host: linux
          target: desktop
          arch: gcc_64
          cache: true

      - name: Install Qt (Android arm64-v8a)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.9.0
          host: linux
          target: android
          arch: android_arm64_v8a
          cache: true

      - name: Configure (Android arm64-v8a)
        run: |
          # install-qt-action sets QT_ROOT_DIR to the last-installed arch
          # (android here); the host build sits in a sibling gcc_64 dir.
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$QT_ROOT_DIR/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DQT_HOST_PATH="${QT_ROOT_DIR%/*}/gcc_64" \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DANDROID_NDK_ROOT="$ANDROID_NDK_ROOT" \
            -B build-android \
            -S .

      - name: Build Android APK
        run: cmake --build build-android
