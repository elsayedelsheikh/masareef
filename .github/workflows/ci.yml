name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6.9.x
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.9.0
          modules: qtcharts
          cache: true

      - name: Configure (Linux + QML)
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DMASAREEF_BUILD_QML=ON \
            -B build-ci \
            -S .

      - name: Build
        run: cmake --build build-ci

      - name: Test
        run: ctest --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen
        working-directory: build-ci

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Qt (host tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.9.0
          host: linux
          target: desktop
          # no arch: let the action pick the default (linux_gcc_64 on 6.7+);
          # the desktop-arch name changed and hardcoding it breaks on Qt bumps.
          cache: true

      # QT_ROOT_DIR now points at the host build; capture it before the Android
      # install overwrites QT_ROOT_DIR with the android arch dir.
      - name: Save host Qt path
        run: echo "QT_HOST_PATH=$QT_ROOT_DIR" >> "$GITHUB_ENV"

      - name: Install Qt (Android arm64-v8a)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.9.0
          host: linux
          target: android
          arch: android_arm64_v8a
          cache: true

      - name: Configure (Android arm64-v8a)
        run: |
          # QT_ROOT_DIR = android arch dir (last install); QT_HOST_PATH was
          # captured from the host install above.
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$QT_ROOT_DIR/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DQT_HOST_PATH="$QT_HOST_PATH" \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DANDROID_NDK_ROOT="$ANDROID_NDK_ROOT" \
            -B build-android \
            -S .

      - name: Build Android APK
        run: cmake --build build-android
